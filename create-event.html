<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/create-event.css"> 
    <script src="js/navbar.js" defer></script>   
</head>

<body>

    <!--Bottom nav bar-->
    <nav>
        <ul>
            <li><a id="houseButtonLink" href="index.html"><i id="houseButton" class="fa-solid fa-house fa-xl" ></i></a></li>
            <li><a id="createEventButtonLink" href="create-event.html"><i id="createEventButton" class="fa-solid fa-circle-plus fa-xl"></i></a></li>
            <li><a id="profileButtonLink" href="account-in.html"><i id="profileButton" class="fa-solid fa-user fa-xl"></i></a></li>
        </ul>
    </nav>




<section class="create-event">
    <h2>Create Event</h2>

    <div class="input-group">
        <input type="text" id="title" placeholder="Event Name">

        <input type="date" id="date">

        <textarea
        id="description"
        placeholder="Describe your event"></textarea>

        <input
        type="file"
        id="image"
        accept="image/*">
    </div>

    <button onclick="newEvent()">
        Create Event
    </button>
</section>

<section class="events-section">
    <h2>Upcoming Events</h2>

    <div id="eventList" class="event-list"></div>
</section>


<script src="js/create-event.js" defer></script>

</body>
</html>
